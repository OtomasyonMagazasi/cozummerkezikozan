<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7931e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#gradient)" stroke="#fff" stroke-width="1"/>

  <!-- Wrench icon -->
  <g transform="translate(16,16)">
    <!-- Wrench handle -->
    <rect x="-2" y="-8" width="4" height="12" rx="1" fill="#fff"/>
    <!-- Wrench head -->
    <circle cx="0" cy="-10" r="3" fill="#fff"/>
    <circle cx="0" cy="-10" r="1.5" fill="url(#gradient)"/>
    <!-- Wrench teeth -->
    <rect x="-3.5" y="-11.5" width="7" height="1" fill="url(#gradient)"/>
    <rect x="-3.5" y="-8.5" width="7" height="1" fill="url(#gradient)"/>
  </g>

  <!-- Small gear in corner -->
  <g transform="translate(22,8)">
    <circle cx="0" cy="0" r="4" fill="#fff" opacity="0.8"/>
    <circle cx="0" cy="0" r="2" fill="url(#gradient)"/>
    <!-- Gear teeth -->
    <rect x="-4.5" y="-0.5" width="9" height="1" fill="#fff" opacity="0.8"/>
    <rect x="-0.5" y="-4.5" width="1" height="9" fill="#fff" opacity="0.8"/>
  </g>
</svg>
